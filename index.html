<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pundit Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="panel">
        <div class="brand">PUNDIT <span class="beta">BETA</span></div>

        <section class="control-block">
          <h3>Party Filter</h3>
          <div class="party-scale-labels">
            <span>Democrat</span>
            <span id="party-mode-label">Both</span>
            <span>Republican</span>
          </div>
          <input id="party-slider" class="party-slider" type="range" min="0" max="2" step="1" value="1" />
        </section>

        <section class="control-block">
          <h3>Layers</h3>
          <label><input type="checkbox" id="toggle-house" checked /> House of Representatives</label>
          <label><input type="checkbox" id="toggle-senate" checked /> United States Senate</label>
          <label><input type="checkbox" id="toggle-governors" checked /> State Governors</label>
        </section>

        <div class="status" id="status">Loading congressional + governors data...</div>
      </aside>

      <main id="map" aria-label="United States congressional map"></main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
