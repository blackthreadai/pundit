<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POLI·TICKS</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="panel">
        <div class="brand">POLI·TICKS <span class="beta">BETA</span></div>
        <div class="subtitle"><em>latin. from poly (many) and ticks (blood sucking insects).</em></div>

        <details class="control-block collapsible" open>
          <summary><h3>PARTY FILTER</h3></summary>
          <div class="content">
            <div class="party-scale-labels">
              <span>Democrat</span>
              <span id="party-mode-label">Both</span>
              <span>Republican</span>
            </div>
            <input id="party-slider" class="party-slider" type="range" min="0" max="2" step="1" value="1" />
          </div>
        </details>

        <details class="control-block collapsible" open>
          <summary><h3>POLITICIANS</h3></summary>
          <div class="content">
            <label><input type="checkbox" id="toggle-house" checked /> House of Representatives</label>
            <label><input type="checkbox" id="toggle-senate" checked /> United States Senate</label>
            <label><input type="checkbox" id="toggle-governors" checked /> State Governors</label>
          </div>
        </details>

        <details class="control-block collapsible">
          <summary><h3>ETHNICITY</h3></summary>
          <div class="content">
            <label><input type="checkbox" id="ethnicity-white" /> White</label>
            <label><input type="checkbox" id="ethnicity-black" /> Black / African American</label>
            <label><input type="checkbox" id="ethnicity-hispanic" /> Hispanic / Latino</label>
            <label><input type="checkbox" id="ethnicity-asian" /> Asian</label>
            <label><input type="checkbox" id="ethnicity-native" /> Native American / Alaska Native</label>
            <label><input type="checkbox" id="ethnicity-mena" /> Middle Eastern / North African</label>
            <label><input type="checkbox" id="ethnicity-pacific" /> Native Hawaiian / Pacific Islander</label>
            <label><input type="checkbox" id="ethnicity-multiracial" /> Multiracial / Other</label>
          </div>
        </details>

        <details class="control-block collapsible">
          <summary><h3>RELIGION</h3></summary>
          <div class="content">
            <label><input type="checkbox" id="religion-christian" /> Christian</label>
            <label><input type="checkbox" id="religion-muslim" /> Muslim</label>
            <label><input type="checkbox" id="religion-jewish" /> Jewish</label>
            <label><input type="checkbox" id="religion-non-religious" /> Non-Religious</label>
          </div>
        </details>

        <details class="control-block collapsible">
          <summary><h3>GREAT ALLIES</h3></summary>
          <div class="content">
            <label><input type="checkbox" id="watch-visited-israel" /> Has Visited Israel</label>
            <label><input type="checkbox" id="watch-kiss-the-wall" /> Kissed The Wall</label>
            <label><input type="checkbox" id="watch-funded-aipac" /> Funded By AIPAC</label>
          </div>
        </details>

        <div class="status" id="status">Loading congressional + governors data...</div>
      </aside>

      <main id="map" aria-label="United States congressional map"></main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
